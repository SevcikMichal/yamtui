# =============================================================================
# Theme Demo - Demonstrates the declarative theme system
# =============================================================================
# This example shows:
#   - Using a built-in theme (catppuccin)
#   - Inline color palette definition
#   - Per-component style overrides
#   - Focused state styling
#
# Usage: go run cmd/examples/main.go theme-demo
# =============================================================================

alt_screen: true

theme:
  name: "catppuccin"
  
  # Override just the accent color
  colors:
    accent: "#FAB387"

  # Base style for all components
  default:
    padding: [1, 2, 1, 2]
    margin: [0, 0, 0, 0]

  # Style for the focused component
  focused:
    border: rounded
    border_color: blue
    color: lavender

  # Per-component overrides
  components:
    notesArea:
      border: rounded
      border_color: muted
    quickInput:
      color: accent
      padding: [0, 1, 0, 1]
    statusInput:
      color: green

components:
  # Left column: multi-line textarea for notes
  notesArea:
    type: "textarea"
    properties:
      placeholder: "Write your notes here..."
      setWordWrap: true
      rows: 10

  # Right column: single-line input for quick commands
  quickInput:
    type: "input"
    properties:
      placeholder: "Quick command..."
      prompt: "$ "
      cursor: true

  # Bottom status input
  statusInput:
    type: "input"
    properties:
      placeholder: "Enter status update..."
      prompt: "status> "
      cursor: true

layout:
  rows:
    # Top row: two columns side by side
    - components: ["notesArea", "quickInput"]
      spacing: 2
    # Bottom row: single full-width component
    - components: ["statusInput"]

keybindings:
  # Navigate between components
  tab: focusNext
  shift+tab: focusPrev
  # Execute commands
  enter: submitNote
  ctrl+c: quitApp

commands:
  # Quit command with inline bind (alternative to keybindings section)
  quitApp:
    type: "quit"
    bind: "q"

  # Focus command - moves focus to notesArea
  focusNotes:
    type: "focus"
    target: "notesArea"

  # Focus command - moves focus to quickInput
  focusQuick:
    type: "focus"
    target: "quickInput"

  # Focus command - moves focus to statusInput
  focusStatus:
    type: "focus"
    target: "statusInput"

  # Custom submit command (placeholder - would need custom handler registration)
  submitNote:
    type: "focus"
    target: "statusInput"
    bind: ":"
